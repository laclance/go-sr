name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: golangci-lint
        run: golangci-lint run

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')"
          echo "coverage=${total}"
          test "${total}" = "100.0%"

      - name: Fuzz aggregate smoke
        run: go test -run=^$ -fuzz=FuzzAggregateCandlesToTimeframe -fuzztime=5s

      - name: Fuzz compute smoke
        run: go test -run=^$ -fuzz=FuzzComputeInvariants -fuzztime=5s
